version: 1
schema: opencode.messages.v1

# ============================================================================
# Message Layer - Presentation Only
# ============================================================================
# This file contains ONLY presentation/display content.
# Runtime does NOT use these fields for any logic.
# Messages never affect: transitions, commands, guards, or state resolution.
#
# Message IDs (id) are stable references for cross-spec conformance.
# Context keys are restricted to a defined set (see context_contract).
# Commands referenced in hints MUST be validated against command_policy.yaml.

# ============================================================================
# Context Contract
# ============================================================================
# Defines allowed context keys and their semantics.
# Unknown context keys cause validation errors.

context_contract:
  allowed_keys:
    - "state_id"          # Current state ID
    - "event"             # Triggering event name
    - "command"           # Command that triggered (if applicable)
    - "iteration_count"   # Current iteration number (for review loops)
    - "max_iterations"    # Maximum iterations allowed
    - "required_evidence" # List of required evidence keys
  fallback_rules:
    missing_state_id: "ERROR: state_id context required"
    missing_event: "ERROR: event context required for transition messages"
    unknown_key: "ERROR: unknown context key '{key}'"
  # Context values must be strings or numbers, not complex objects
  value_types:
    - "string"
    - "number"

# ============================================================================
# State Messages
# ============================================================================
# Presentation content for each state.
# Category definitions:
# - display_name: Pure state identifier for UI
# - gate_message: Current gate/status display
# - instruction: Next action hints (may reference allowed commands)

state_messages:
  - id: "msg.state.0"
    state_id: "0"
    display_name: "0-None"
    gate_message: "Bootstrap Required"
    instruction: "Run bootstrap before governance execution."
    # Conformance: No commands allowed in state 0 (bootstrap)

  - id: "msg.state.1.1"
    state_id: "1.1"
    display_name: "1.1-Bootstrap"
    gate_message: "Workspace Ready Gate"
    instruction: "Complete workspace persistence and pointer verification."

  - id: "msg.state.1"
    state_id: "1"
    display_name: "1-WorkspacePersistence"
    gate_message: "Persistence Gate"
    instruction: "Persist bootstrap artifacts and verify workspace state."

  - id: "msg.state.1.2"
    state_id: "1.2"
    display_name: "1.2-ActivationIntent"
    gate_message: "Activation Intent"
    instruction: "Activation intent committed; continue to repository discovery."

  - id: "msg.state.1.3"
    state_id: "1.3"
    display_name: "1.3-RulebookLoad"
    gate_message: "Rulebook Load Gate"
    instruction: "Load core/profile/templates/addons rulebooks with evidence."

  - id: "msg.state.2"
    state_id: "2"
    display_name: "2-RepoDiscovery"
    gate_message: "Repo Discovery"
    instruction: "Run repository discovery and cache artifacts."

  - id: "msg.state.2.1"
    state_id: "2.1"
    display_name: "2.1-DecisionPack"
    gate_message: "Decision Pack"
    instruction: "Resolve business rules path, then continue."

  - id: "msg.state.1.5"
    state_id: "1.5"
    display_name: "1.5-BusinessRules"
    gate_message: "Business Rules Bootstrap"
    instruction: "Business rules persisted; continue with API inventory."

  - id: "msg.state.3A"
    state_id: "3A"
    display_name: "3A-API-Inventory"
    gate_message: "API Inventory"
    instruction: "Inventory APIs and decide whether deep validation applies."

  - id: "msg.state.3B-1"
    state_id: "3B-1"
    display_name: "3B-1"
    gate_message: "API Logical Validation"
    instruction: "Validate API logic constraints and continue."

  - id: "msg.state.3B-2"
    state_id: "3B-2"
    display_name: "3B-2"
    gate_message: "Contract Validation"
    instruction: "Validate API contracts and continue to ticket intake."

  - id: "msg.state.4"
    state_id: "4"
    display_name: "4"
    gate_message: "Ticket Input Gate"
    instruction: "Collect ticket and planning constraints or use /review for read-only feedback."
    # Conformance: /continue, /ticket, /review are allowed in state 4

  - id: "msg.state.5"
    state_id: "5"
    display_name: "5-ArchitectureReview"
    gate_message: "Plan Record Preparation Gate"
    instruction: "Create plan-record evidence and complete self-review iterations."
    # Conformance: /plan, /review are allowed in state 5

  - id: "msg.state.5.3"
    state_id: "5.3"
    display_name: "5.3-TestQuality"
    gate_message: "Test Quality Gate"
    instruction: "Validate tests and quality checks."

  - id: "msg.state.5.4"
    state_id: "5.4"
    display_name: "5.4-BusinessRules"
    gate_message: "Business Rules Validation"
    instruction: "Validate business-rules consistency when Phase 1.5 was executed."

  - id: "msg.state.5.5"
    state_id: "5.5"
    display_name: "5.5-TechnicalDebt"
    gate_message: "Technical Debt Review"
    instruction: "Capture and control technical debt."

  - id: "msg.state.5.6"
    state_id: "5.6"
    display_name: "5.6-RollbackSafety"
    gate_message: "Rollback Safety Gate"
    instruction: "Validate rollback safety requirements."

  - id: "msg.state.6"
    state_id: "6"
    display_name: "6-Implementation"
    gate_message: "Implementation Internal Review"
    instruction: "Phase 5 checks complete; start internal implementation review."
    # Conformance: /implement, /review-decision allowed in 6 (transitional)

# ============================================================================
# Transition Messages
# ============================================================================
# Presentation content for specific transitions.
# transition_key format: "<source_state_id>-<event_name>"
# Messages are keyed by source + event for precise targeting.

transition_messages:
  # Phase 1.2 transitions
  - id: "msg.trans.1.2.default"
    transition_key: "1.2-default"
    gate_message: "Rulebook Load Gate"
    instruction: "Execute Phase 1.3 Rulebook Load (auto)"

  # Phase 2.1 transitions
  - id: "msg.trans.2.1.business_rules_execute"
    transition_key: "2.1-business_rules_execute"
    gate_message: "Business Rules Bootstrap"
    instruction: "Auto-bootstrap business rules placeholder when inventory is missing"

  - id: "msg.trans.2.1.default"
    transition_key: "2.1-default"
    gate_message: "API Validation Routing"
    instruction: "Execute Phase 3A API Inventory"

  # Phase 3A transitions
  - id: "msg.trans.3A.no_apis"
    transition_key: "3A-no_apis"
    gate_message: "Ticket Input Gate"
    instruction: "Phase 3A completed with not-applicable; use /continue to proceed to Phase 4"
    # Conformance: /continue is universal; /ticket available after reaching Phase 4

  - id: "msg.trans.3A.default"
    transition_key: "3A-default"
    gate_message: "API Logical Validation"
    instruction: "APIs detected; proceed to Phase 3B-1"

  # Phase 3B-1 transitions
  - id: "msg.trans.3B-1.default"
    transition_key: "3B-1-default"
    gate_message: "Contract Validation"
    instruction: "Phase 3B-1 complete; proceed to Phase 3B-2"

  # Phase 3B-2 transitions
  - id: "msg.trans.3B-2.default"
    transition_key: "3B-2-default"
    gate_message: "Ticket Input Gate"
    instruction: "Phase 3B-2 complete; use /continue to proceed to Phase 4"

  # Phase 4 transitions
  - id: "msg.trans.4.ticket_present"
    transition_key: "4-ticket_present"
    gate_message: "Plan Record Preparation Gate"
    instruction: "Evidence captured; continue to Phase 5"
    # Conformance: /continue advances routing

  - id: "msg.trans.4.default"
    transition_key: "4-default"
    gate_message: "Ticket Input Gate"
    instruction: "Use /ticket to provide details or /review for read-only feedback"
    # Conformance: /ticket allowed in 4, /review is universal read-only

  # Phase 5 transitions
  - id: "msg.trans.5.plan_record_missing"
    transition_key: "5-plan_record_missing"
    gate_message: "Plan Record Preparation Gate"
    instruction: "Use /plan to create plan-record evidence"

  - id: "msg.trans.5.self_review_iterations_pending"
    transition_key: "5-self_review_iterations_pending"
    gate_message: "Architecture Review Gate"
    instruction: "Continue deterministic self-review until completion"

  - id: "msg.trans.5.self_review_iterations_met"
    transition_key: "5-self_review_iterations_met"
    gate_message: "Architecture Review Gate"
    instruction: "Review loop complete; proceed to Phase 5.3"

  - id: "msg.trans.5.default"
    transition_key: "5-default"
    gate_message: "Architecture Review Gate"
    instruction: "Stay in Phase 5 until evidence and review iterations complete"

  # Phase 5.3 transitions
  - id: "msg.trans.5.3.business_rules_gate_required"
    transition_key: "5.3-business_rules_gate_required"
    gate_message: "Business Rules Validation"
    instruction: "Phase 5.4 is mandatory before proceeding"

  - id: "msg.trans.5.3.technical_debt_proposed"
    transition_key: "5.3-technical_debt_proposed"
    gate_message: "Technical Debt Gate"
    instruction: "Evaluate technical debt in Phase 5.5"

  - id: "msg.trans.5.3.rollback_required"
    transition_key: "5.3-rollback_required"
    gate_message: "Rollback Safety Gate"
    instruction: "Rollback safety checks required in Phase 5.6"

  - id: "msg.trans.5.3.default"
    transition_key: "5.3-default"
    gate_message: "Implementation Internal Review"
    instruction: "Phase 5 checks complete; proceed to implementation review"

  # Phase 5.4 transitions
  - id: "msg.trans.5.4.technical_debt_proposed"
    transition_key: "5.4-technical_debt_proposed"
    gate_message: "Technical Debt Gate"
    instruction: "Business rules validation complete; technical debt proposed"

  - id: "msg.trans.5.4.rollback_required"
    transition_key: "5.4-rollback_required"
    gate_message: "Rollback Safety Gate"
    instruction: "Business rules validation complete; rollback checks required"

  - id: "msg.trans.5.4.default"
    transition_key: "5.4-default"
    gate_message: "Implementation Internal Review"
    instruction: "Business rules validation complete; proceed to implementation review"

  # Phase 5.5 transitions
  - id: "msg.trans.5.5.rollback_required"
    transition_key: "5.5-rollback_required"
    gate_message: "Rollback Safety Gate"
    instruction: "Technical debt reviewed; rollback safety checks required"

  - id: "msg.trans.5.5.default"
    transition_key: "5.5-default"
    gate_message: "Implementation Internal Review"
    instruction: "Technical debt reviewed; proceed to implementation review"

  # Phase 5.6 transitions
  - id: "msg.trans.5.6.default"
    transition_key: "5.6-default"
    gate_message: "Implementation Internal Review"
    instruction: "Rollback safety validated; proceed to implementation review"

  # Phase 6 transitions
  - id: "msg.trans.6.implementation_accepted"
    transition_key: "6-implementation_accepted"
    gate_message: "Implementation Execution"
    instruction: "Implementation accepted; continue execution"

  - id: "msg.trans.6.implementation_blocked"
    transition_key: "6-implementation_blocked"
    gate_message: "Implementation Blocked"
    instruction: "Resolve blockers and rerun /implement"
    # Conformance: /implement allowed in 6.approved (future substate)

  - id: "msg.trans.6.implementation_rework_clarification_pending"
    transition_key: "6-implementation_rework_clarification_pending"
    gate_message: "Rework Clarification"
    instruction: "Clarify in chat, then run /implement"
    # Conformance: /implement allowed in 6.approved (future substate)

  - id: "msg.trans.6.implementation_presentation_ready"
    transition_key: "6-implementation_presentation_ready"
    gate_message: "Implementation Presentation"
    instruction: "Submit /implementation-decision approve|changes_requested|reject"
    # Conformance: /implementation-decision allowed in 6.presentation (future)

  - id: "msg.trans.6.workflow_approved"
    transition_key: "6-workflow_approved"
    gate_message: "Workflow Approved"
    instruction: "Governance complete. Run /implement to start implementation."
    # Conformance: /implement allowed in 6.approved (future substate)

  - id: "msg.trans.6.review_changes_requested"
    transition_key: "6-review_changes_requested"
    gate_message: "Changes Requested"
    instruction: "Clarify changes, then use /continue to return to earlier phase"
    # Conformance: /continue is universal

  - id: "msg.trans.6.rework_clarification_pending"
    transition_key: "6-rework_clarification_pending"
    gate_message: "Rework Clarification Required"
    instruction: "Describe changes in chat, then use /continue to proceed"

  - id: "msg.trans.6.implementation_review_complete"
    transition_key: "6-implementation_review_complete"
    gate_message: "Review Decision Required"
    instruction: "Submit /review-decision approve|changes_requested|reject"
    # Conformance: /review-decision allowed in 6.presentation (future substate)

  - id: "msg.trans.6.implementation_started"
    transition_key: "6-implementation_started"
    gate_message: "Implementation Started"
    instruction: "Implementation execution has started"

  - id: "msg.trans.6.implementation_execution_in_progress"
    transition_key: "6-implementation_execution_in_progress"
    gate_message: "Implementation In Progress"
    instruction: "Implementation execution is in progress"

  - id: "msg.trans.6.implementation_review_pending"
    transition_key: "6-implementation_review_pending"
    gate_message: "Review Pending"
    instruction: "Implementation review is pending"

  - id: "msg.trans.6.review_rejected"
    transition_key: "6-review_rejected"
    gate_message: "Review Rejected"
    instruction: "Return to Phase 4 for rework"
    # Conformance: This is a rejection - returns to state 4

  - id: "msg.trans.6.default"
    transition_key: "6-default"
    gate_message: "Implementation Review"
    instruction: "Continue implementation review process"

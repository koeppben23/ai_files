# ============================================================================
# Transition Messages
# ============================================================================
# Presentation content for specific transitions.
# Uses explicit state_id + event fields (not composite key).
# This makes parsing unambiguous and validation straightforward.

transition_messages:
  # Phase 1.2 transitions
  - id: "msg.trans.1.2.default"
    state_id: "1.2"
    event: "default"
    gate_message: "Rulebook Load Gate"
    instruction: "Execute Phase 1.3 Rulebook Load (auto)"


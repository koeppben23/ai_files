version: 1
schema: opencode.command_policy.v1

# ============================================================================
# Command Policy
# ============================================================================
# Defines what commands are allowed in each state and what events they produce.
#
# Command → Event Mapping (ADR-004):
# - Commands are user/system inputs
# - Events are machine-internal signals for state transitions
# - Each command maps to explicit events it produces
# - produces_events is REQUIRED for mutating commands (deterministic)
# - Empty produces_events means state change via evidence, not direct event
#
# Runtime fields: id, command, allowed_in, mutating, behavior, produces_events
# Non-runtime (ignored by runtime): description only
#
# IMPORTANT: This policy does NOT contain constraints or text semantics.
# All behavioral rules must be expressed in guards, not in command text.

commands:
  # ============================================================================
  # Universal Commands
  # ============================================================================
  # /continue is deterministic: per state, exactly one guard fires,
  # producing exactly one event. No ambiguity, no silent fallback.
  # /review is read-only: never mutates state, safe in all states.

  - id: "cmd_continue"
    command: "/continue"
    description: "Advance routing - exactly one guard fires per state, producing exactly one event"
    allowed_in: "*"
    mutating: true
    behavior:
      type: "advance_routing"
      # Determinism contract:
      # - For each state, exactly one guard condition evaluates to true
      # - The matching transition produces exactly one event
      # - No fallback, no ambiguity, no silent mutations
      determinism: "exactly_one_guard_per_state"
    produces_events: "*_via_guards"  # Special: events determined by guard evaluation

  - id: "cmd_review_readonly"
    command: "/review"
    description: "Review PR/files read-only - never mutates state, safe in all states including blocked/critical"
    # JUSTIFICATION: /review is universally allowed because:
    # 1. It is pure read-only - never mutates governance state
    # 2. It only produces local findings/verdict, no state events
    # 3. Safe during blocking, rework, or critical situations
    # 4. Users need review capability even when workflow is paused
    allowed_in: "*"
    mutating: false
    behavior:
      type: "review_readonly"
      inputs:
        - "pr_url"
        - "file_path"
        - "directory_path"
    produces_events: []  # No state events, only local findings

  # ============================================================================
  # State-Specific Commands
  # ============================================================================

  - id: "cmd_ticket"
    command: "/ticket"
    description: "Persist ticket/task evidence for intake"
    allowed_in:
      - "4"
    mutating: true
    behavior:
      type: "persist_evidence"
      evidence_class: "ticket"
    produces_events: []  # State change via evidence, not direct event

  - id: "cmd_plan"
    command: "/plan"
    description: "Generate and persist plan record"
    allowed_in:
      - "4"
      - "5"
    mutating: true
    behavior:
      type: "persist_evidence"
      evidence_class: "plan"
    produces_events: []  # State change via evidence, not direct event

  # ============================================================================
  # Phase 6 Commands (TRANSITIONAL - per ADR-003, should be in 6.approved)
  # ============================================================================
  # These commands currently target State "6" (Phase 6 monolith).
  # After Phase 6 zerlegung, they will target specific substates:
  # - /implement → 6.approved
  # - /review-decision → 6.presentation
  #
  # Semantic distinction:
  # - /review-decision: Decides on workflow/plan approval (user review)
  # - /implementation-decision: Same functionality, alternative command name

  - id: "cmd_implement"
    command: "/implement"
    description: "Start or continue implementation execution"
    allowed_in:
      - "6"  # TRANSITIONAL: Ist-Zustand, per ADR-003 should be 6.approved
    mutating: true
    behavior:
      type: "start_implementation"
    produces_events:
      - "implementation_started"
      - "implementation_execution_in_progress"

  - id: "cmd_review_decision"
    command: "/review-decision"
    description: "Submit final review decision - decides workflow/plan approval"
    allowed_in:
      - "6"  # TRANSITIONAL: Ist-Zustand, per ADR-003 should be 6.presentation
    mutating: true
    behavior:
      type: "submit_review_decision"
      decision_scope: "workflow"  # This decides workflow approval
      allowed_decisions:
        - "approve"      # → workflow_approved event
        - "changes_requested"  # → review_changes_requested event
        - "reject"       # → review_rejected event
    produces_events:
      - "workflow_approved"
      - "review_changes_requested"
      - "review_rejected"

  - id: "cmd_implementation_decision"
    command: "/implementation-decision"
    description: "Submit implementation review decision - alternative name for /review-decision"
    allowed_in:
      - "6"  # TRANSITIONAL: Same scope as /review-decision
    mutating: true
    behavior:
      type: "submit_review_decision"
      decision_scope: "workflow"  # Same as /review-decision
      allowed_decisions:
        - "approve"
        - "changes_requested"
        - "reject"
      aliases: "cmd_review_decision"  # This is an alias
    produces_events:
      - "workflow_approved"
      - "review_changes_requested"
      - "review_rejected"

# ============================================================================
# Command Restriction Rules
# ============================================================================
# Defines states where commands are restricted (beyond allowed_in).

command_restrictions:
  # Terminal states - no mutating commands allowed
  - state_pattern: "*.terminal"
    blocked_command_types:
      - "persist_evidence"
      - "start_implementation"
      - "submit_review_decision"
    reason: "Terminal states are immutable"

  # Blocked implementation states
  - state_pattern: "6.blocked"
    blocked_commands:
      - "/review-decision"  # Can't approve while blocked
      - "/implementation-decision"
    reason: "Implementation blocked - resolve blockers first"

  # Complete workflow states
  - state_pattern: "6.complete"
    blocked_command_types:
      - "start_implementation"
      - "submit_review_decision"
    reason: "Workflow complete - no further decisions needed"

# ============================================================================
# Output Policies
# ============================================================================
# Controls what output classes are allowed/forbidden in each state.
# Each policy has a stable ID for reference.

output_policies:
  - id: "op.phase5.review_only"
    state_id: "5"
    description: "Architecture review phase - planning only, no implementation"
    allowed_output_classes:
      - "plan"
      - "review"
      - "risk_analysis"
      - "test_strategy"
      - "gate_check"
      - "rollback_plan"
      - "review_questions"
      - "consolidated_review_plan"
    forbidden_output_classes:
      - "implementation"
      - "patch"
      - "diff"
      - "code_delivery"
    plan_discipline:
      first_output_is_draft: true
      draft_not_review_ready: true
      min_self_review_iterations: 1

# ============================================================================
# Phase Output Policy Map
# ============================================================================
# Maps states to their output policies using stable policy IDs.
# States not in this map have unbounded output (no restrictions).
# 
# Semantics: Inheritance (child states inherit parent's policy)
# Conflict rule: Later entries override earlier entries for same state

phase_output_policy_map:
  - state_id: "5"
    output_policy_ref: "op.phase5.review_only"
  - state_id: "5.3"
    output_policy_ref: "op.phase5.review_only"  # Inherits from 5
  - state_id: "5.4"
    output_policy_ref: "op.phase5.review_only"  # Inherits from 5
  - state_id: "5.5"
    output_policy_ref: "op.phase5.review_only"  # Inherits from 5
  - state_id: "5.6"
    output_policy_ref: "op.phase5.review_only"  # Inherits from 5

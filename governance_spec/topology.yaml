        event: default
        target: "2"

  - id: "2"
    terminal: false
    transitions:
      - id: "t2-t2.1"
        event: default
        target: "2.1"

  - id: "2.1"
    terminal: false
    transitions:
      - id: "t2.1-t1.5"
        event: business_rules_execute
        target: "1.5"
      - id: "t2.1-t3A"
        event: default
        target: "3A"

  - id: "1.5"
    terminal: false
    transitions:
      - id: "t1.5-t3A"
        event: default
        target: "3A"

  - id: "3A"
    terminal: false
    transitions:
      - id: "t3A-t4"
        event: no_apis
        target: "4"
      - id: "t3A-t3B-1"
        event: default
        target: "3B-1"

  - id: "3B-1"
    terminal: false
    transitions:
      - id: "t3B-1-t3B-2"
        event: default
        target: "3B-2"

  - id: "3B-2"
    terminal: false
    transitions:
      - id: "t3B-2-t4"
        event: default
        target: "4"

  - id: "4"
    terminal: false
    transitions:
      - id: "t4-t5"
        event: ticket_present
        target: "5"
      - id: "t4-t4"
        event: default
        target: "4"

  - id: "5"
    terminal: false
    transitions:
      - id: "t5-t5-missing"
        event: plan_record_missing
        target: "5"
      - id: "t5-t5-pending"
        event: self_review_iterations_pending
        target: "5"
      - id: "t5-t5.3"
        event: self_review_iterations_met
        target: "5.3"
      - id: "t5-t5-default"
        event: default
        target: "5"

  - id: "5.3"
    terminal: false
    transitions:
      - id: "t5.3-t5.4"
        event: business_rules_gate_required
        target: "5.4"
      - id: "t5.3-t5.5"
        event: technical_debt_proposed
        target: "5.5"
      - id: "t5.3-t5.6"
        event: rollback_required
        target: "5.6"
      - id: "t5.3-t6.internal_review"
        event: default
        target: "6.internal_review"

  - id: "5.4"
    terminal: false
    transitions:
      - id: "t5.4-t5.5"
        event: technical_debt_proposed
        target: "5.5"
      - id: "t5.4-t5.6"
        event: rollback_required
        target: "5.6"
      - id: "t5.4-t6.internal_review"
        event: default
        target: "6.internal_review"

  - id: "5.5"
    terminal: false
    transitions:
      - id: "t5.5-t5.6"
        event: rollback_required
        target: "5.6"
      - id: "t5.5-t6.internal_review"
        event: default
        target: "6.internal_review"

  - id: "5.6"
    terminal: false
    transitions:
      - id: "t5.6-t6"
        event: default
        target: "6"

  - id: "6"
    terminal: false
    description: "Phase 6 - Implementation workflow container"
    transitions:
      - id: "t6-t6.presentation"
        event: implementation_presentation_ready
        target: "6.presentation"
      - id: "t6-t6.internal_review"
        event: default
        target: "6.internal_review"

  - id: "6.internal_review"
    terminal: false
    parent: "6"
    transitions:
      - id: "t6.internal_review-t6.internal_review-pending"
        event: implementation_review_pending
        target: "6.internal_review"
      - id: "t6.internal_review-t6.presentation"
        event: implementation_review_complete
        target: "6.presentation"
      - id: "t6.internal_review-t6.internal_review-default"
        event: default
        target: "6.internal_review"

  - id: "6.presentation"
    terminal: false
    parent: "6"
    description: "Evidence presentation, awaiting review decision"
    transitions:
      - id: "t6.presentation-t6.approved"
        event: workflow_approved
        target: "6.approved"
      - id: "t6.presentation-t6.rework"
        event: review_changes_requested
        target: "6.rework"
      - id: "t6.presentation-t6.rejected"
        event: review_rejected
        target: "6.rejected"
      - id: "t6.presentation-t6.presentation-clarification"
        event: rework_clarification_pending
        target: "6.presentation"
      - id: "t6.presentation-t6.presentation-default"
        event: default
        target: "6.presentation"

  - id: "6.execution"
    terminal: false
    parent: "6"
    transitions:
      - id: "t6.execution-t6.execution-review-pending"
        event: implementation_review_pending
        target: "6.execution"
      - id: "t6.execution-t6.presentation-review-complete"
        event: implementation_review_complete
        target: "6.presentation"
      - id: "t6.execution-t6.execution-in-progress"
        event: implementation_execution_in_progress
        target: "6.execution"
      - id: "t6.execution-t6.internal_review"
        event: implementation_accepted
        target: "6.internal_review"
      - id: "t6.execution-t6.blocked"
        event: implementation_blocked
        target: "6.blocked"
      - id: "t6.execution-t6.rework"
        event: implementation_rework_clarification_pending
        target: "6.rework"
      - id: "t6.execution-t6.execution-started"
        event: implementation_started
        target: "6.execution"
      - id: "t6.execution-t6.complete"
        event: workflow_complete
        target: "6.complete"
      - id: "t6.execution-t6.execution-default"
        event: default
        target: "6.execution"

  - id: "6.approved"
    terminal: false
    parent: "6"
    description: "Implementation plan approved, awaiting /implement to start execution"
    transitions:
      - id: "t6.approved-t6.execution"
        event: implementation_started
        target: "6.execution"
      - id: "t6.approved-t6.approved-default"
        event: default
        target: "6.approved"

  - id: "6.blocked"
    terminal: false
    parent: "6"
    description: "Implementation blocked, resolve blockers and use /retry_implementation"
    transitions:
      - id: "t6.blocked-t6.blocked"
        event: default
        target: "6.blocked"
      - id: "t6.blocked-t6.execution"
        event: implementation_started
        target: "6.execution"

  - id: "6.rework"
    terminal: false
    parent: "6"
    description: "Rework clarification required, use /retry_implementation after clarifying"
    transitions:
      - id: "t6.rework-t6.rework-clarification"
        event: rework_clarification_pending
        target: "6.rework"
      - id: "t6.rework-t6.presentation"
        event: default
        target: "6.presentation"
      - id: "t6.rework-t6.execution"
        event: implementation_started
        target: "6.execution"

  - id: "6.rejected"
    terminal: false
    parent: "6"
    transitions:
      - id: "t6.rejected-t4"
        event: default
        target: "4"

  - id: "6.complete"
    terminal: true
    parent: "6"
    transitions: []

        event: default
        target: "1.1"

  - id: "1.1"
    terminal: false
    transitions:
      - id: "t1.1-t1"
        event: default
        target: "1"

  - id: "1"
    terminal: false
    transitions:
      - id: "t1-t1.2"
        event: default
        target: "1.2"

  - id: "1.2"
    terminal: false
    transitions:
      - id: "t1.2-t1.3"
        event: default
        target: "1.3"

  - id: "1.3"

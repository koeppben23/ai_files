anti_patterns:
- id: AP-PY01
  title: 'Pattern:'
  detects:
  - '`if`/`match` statements in handler functions that branch on domain state; calculations
    or loops in route functions.


    ---'
  recovery: ''
- id: AP-PY02
  title: 'Pattern:'
  detects:
  - 'Direct calls to `datetime.now()`, `time.time()`, `time.sleep()`, `random.*`,
    or `uuid.uuid4()` in test code without injectable seams or monkeypatching.


    ---'
  recovery: ''
- id: AP-PY03
  title: 'Pattern:'
  detects:
  - 'Bare `except:` or `except Exception:` blocks that only log or pass without rethrowing
    or returning an error.


    ---'
  recovery: ''
- id: AP-PY04
  title: 'Pattern:'
  detects:
  - 'Service methods accepting `Request` or `Response` Pydantic models instead of
    domain commands/entities.


    ---'
  recovery: ''
- id: AP-PY05
  title: 'Pattern:'
  detects:
  - 'Module-level mutable variables (`list`, `dict`, `set`) that are modified at runtime;
    singleton patterns using module-level state.


    ---'
  recovery: ''
- id: AP-PY06
  title: 'Pattern:'
  detects:
  - 'Test files with more `mock.patch` / `MagicMock` declarations than behavioral
    assertions; tests that primarily `assert_called_with` without checking outcomes.


    ---'
  recovery: ''
- id: AP-PY07
  title: 'Pattern:'
  detects:
  - 'Service functions/methods that call `get_db_session()`, `requests.get()`, `datetime.now()`
    directly instead of receiving these as injected parameters.


    ---'
  recovery: ''
- id: AP-PY08
  title: 'Pattern:'
  detects:
  - 'Public functions/methods without return type annotations; function parameters
    without type annotations.


    ---'
  recovery: ''
- id: AP-PY09
  title: 'Pattern:'
  detects:
  - '`ImportError` during startup or test collection; `TYPE_CHECKING` imports used
    to work around circular dependencies (symptom, not solution).


    ---'
  recovery: ''
- id: AP-PY10
  title: 'Pattern:'
  detects:
  - '`async def` functions that call synchronous ORMs (SQLAlchemy sync session), `requests.get()`,
    or `time.sleep()` without `asyncio.to_thread()` or equivalent.


    ---'
  recovery: ''
decision_trees:
- id: DT-PY1
  root:
    node_type: condition
    expression: Does the repo already have an established architecture pattern?
    'yes':
      node_type: leaf
      result: Follow detected pattern
    'no':
      node_type: condition
      expression: Is it a FastAPI/Flask application?
      'yes':
        node_type: condition
        expression: Does it require complex domain logic?
        'yes':
          node_type: leaf
          result: Use layered architecture with domain isolation
        'no':
          node_type: leaf
          result: Use flat handler-service pattern
      'no':
        node_type: condition
        expression: Is it a Django application?
        'yes':
          node_type: leaf
          result: Follow Django app convention
        'no':
          node_type: leaf
          result: Use module-per-feature layout
- id: DT-PY2
  root:
    node_type: leaf
    result: Select test type based on component
- id: DT-PY3
  root:
    node_type: leaf
    result: See DT-PY1 decision path

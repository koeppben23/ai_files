anti_patterns:
- id: AP-NG01
  title: 'Pattern:'
  detects:
  - 'Component methods with domain calculations, API calls, or multi-step conditional logic not related to template rendering.


    ---'
  recovery: ''
- id: AP-NG02
  title: 'Pattern:'
  detects:
  - 'Imports from `@ngrx/store` and Angular `signal()` in the same feature module without documented architectural decision.


    ---'
  recovery: ''
- id: AP-NG03
  title: 'Pattern:'
  detects:
  - '`HttpClient` in component constructor/inject; `this.http.get(...)` calls in component methods.


    ---'
  recovery: ''
- id: AP-NG04
  title: 'Pattern:'
  detects:
  - 'API response types used as `@Input()` types or facade return types without a mapping step.


    ---'
  recovery: ''
- id: AP-NG05
  title: 'Pattern:'
  detects:
  - '`.subscribe(() => { someObs$.subscribe(...) })` patterns in component or service code.


    ---'
  recovery: ''
- id: AP-NG06
  title: 'Pattern:'
  detects:
  - '`setTimeout` in test code; `tick()` with large values not tied to specific timer-based logic; `cy.wait(number)` in E2E tests.


    ---'
  recovery: ''
- id: AP-NG07
  title: 'Pattern:'
  detects:
  - '`new FormGroup({...})` without type parameter; `form.get(''fieldName'')` instead of `form.controls.fieldName`; `form.value` used without type assertion.


    ---'
  recovery: ''
- id: AP-NG08
  title: 'Pattern:'
  detects:
  - 'Component decorator without `changeDetection: ChangeDetectionStrategy.OnPush` property.


    ---'
  recovery: ''
- id: AP-NG09
  title: 'Pattern:'
  detects:
  - 'Classes implementing `CanActivate`, `CanDeactivate`, `HttpInterceptor` interfaces; `{ provide: HTTP_INTERCEPTORS, useClass: ... }` in providers.


    ---'
  recovery: ''
- id: AP-NG10
  title: 'Pattern:'
  detects:
  - 'Import paths like `apps/other-app/src/...` in any source file; Nx boundary lint rule violations.


    ---'
  recovery: ''

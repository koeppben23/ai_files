kind: profile
metadata:
  id: profile.scorecard-calibration
  name: Scorecard Calibration Shared Rulebook
  version: '1.0'
  schema_version: 1.2.0
  status: active
  description: >-
    Cross-addon scorecard comparability via standardised weights, thresholds,
    and calibration evidence (CAL-1 through CAL-6).
phase_integration:
  phases:
  - phase_4
  - phase_5
  - phase_6
  required_outputs: []
  required_checks: []
warning_codes:
- code: WARN-SCORECARD-CALIBRATION-INCOMPLETE
  triggers:
  - scorecard data incomplete or non-comparable across addons
  - ScoreRatio / Threshold / CalibrationVersion missing from SESSION_STATE
  recovery: >-
    Populate required CAL-5 fields (ActiveTier, ScoreRatio, Threshold,
    CalibrationVersion) and rerun gate evaluation.
references:
- id: ref_1
  target: profiles/addons/scorecardCalibration.addon.yml
  type: schema
activation:
  type: manifest
  conditions: []
evidence_contract:
  required_artifacts:
  - SESSION_STATE.GateScorecards.principal_excellence.ScoreRatio
  - SESSION_STATE.GateScorecards.principal_excellence.Threshold
  - SESSION_STATE.GateScorecards.principal_excellence.CalibrationVersion
  - SESSION_STATE.AddonsEvidence.scorecardCalibration.status
  required_fields:
  - GateScorecards.principal_excellence.ActiveTier
  - GateScorecards.principal_excellence.Score
  - GateScorecards.principal_excellence.MaxScore
  - GateScorecards.principal_excellence.ScoreRatio
  - GateScorecards.principal_excellence.Threshold
  - GateScorecards.principal_excellence.CalibrationVersion
verification_commands: []

# ── v1.2.0: phase exit contract ─────────────────────────────────────
phase_exit_contract:
- phase: phase_4
  pass_criteria:
  - criterion_key: CAL-1-STANDARD-WEIGHTS
    critical: false
    artifact_kind: scorecard_calibration
  - criterion_key: CAL-2-CRITICAL-FLAG-NORMALIZATION
    critical: true
    artifact_kind: scorecard_calibration
  blocking_conditions:
  - condition_id: BC-SC-P4-MISSING-CRITICAL
    when: missing
    applies_to_severity: critical
    failure_code: BLOCKED-STRICT-EVIDENCE-MISSING
  - condition_id: BC-SC-P4-MISSING-NONCRIT
    when: missing
    applies_to_severity: non_critical
    failure_code: NOT_VERIFIED-STRICT-EVIDENCE-MISSING
  evidence_freshness:
  - artifact_kind: scorecard_calibration
    freshness_class: gate_evidence
- phase: phase_5
  pass_criteria:
  - criterion_key: CAL-3-TIER-SCORE-THRESHOLDS
    critical: true
    artifact_kind: scorecard_calibration
    threshold_mode: dynamic_by_risk_tier
    threshold_resolver: dynamic_by_risk_tier
  - criterion_key: CAL-4-CROSS-ADDON-COMPARABILITY
    critical: false
    artifact_kind: scorecard_calibration
  blocking_conditions:
  - condition_id: BC-SC-P5-MISSING-CRITICAL
    when: missing
    applies_to_severity: critical
    failure_code: BLOCKED-STRICT-EVIDENCE-MISSING
  - condition_id: BC-SC-P5-STALE-CRITICAL
    when: stale
    applies_to_severity: critical
    failure_code: BLOCKED-STRICT-EVIDENCE-STALE
  - condition_id: BC-SC-P5-THRESHOLD-CRITICAL
    when: below_threshold
    applies_to_severity: critical
    failure_code: BLOCKED-STRICT-THRESHOLD
  - condition_id: BC-SC-P5-MISSING-NONCRIT
    when: missing
    applies_to_severity: non_critical
    failure_code: NOT_VERIFIED-STRICT-EVIDENCE-MISSING
  evidence_freshness:
  - artifact_kind: scorecard_calibration
    freshness_class: gate_evidence
- phase: phase_6
  pass_criteria:
  - criterion_key: CAL-5-SESSION-STATE-CALIBRATION-EVIDENCE
    critical: true
    artifact_kind: scorecard_calibration
  - criterion_key: CAL-6-CALIBRATION-WARNING-CODE
    critical: false
    artifact_kind: scorecard_calibration
  blocking_conditions:
  - condition_id: BC-SC-P6-MISSING-CRITICAL
    when: missing
    applies_to_severity: critical
    failure_code: BLOCKED-STRICT-EVIDENCE-MISSING
  - condition_id: BC-SC-P6-STALE-CRITICAL
    when: stale
    applies_to_severity: critical
    failure_code: BLOCKED-STRICT-EVIDENCE-STALE
  - condition_id: BC-SC-P6-MISSING-NONCRIT
    when: missing
    applies_to_severity: non_critical
    failure_code: NOT_VERIFIED-STRICT-EVIDENCE-MISSING
  evidence_freshness:
  - artifact_kind: scorecard_calibration
    freshness_class: gate_evidence

failure_codes:
- code: BLOCKED-STRICT-EVIDENCE-MISSING
- code: BLOCKED-STRICT-EVIDENCE-STALE
- code: BLOCKED-STRICT-THRESHOLD
- code: NOT_VERIFIED-STRICT-EVIDENCE-MISSING
- code: NOT_VERIFIED-STRICT-EVIDENCE-STALE
- code: WARN-SCORECARD-CALIBRATION-INCOMPLETE

patterns: []
anti_patterns: []
decision_trees: []

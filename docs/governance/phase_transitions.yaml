schema: governance.phase-transitions.v1
transitions:
  # ── Early phases ──────────────────────────────────────────────────
  - from: "1.1"
    to: "1.2"
    required_gate: "none"
    block_condition: "missing bootstrap evidence"
  - from: "1.2"
    to: "1.3"
    required_gate: "none"
    block_condition: "profile detection ambiguous"
  - from: "1.3"
    to: "2"
    required_gate: "none"
    block_condition: "core rulebook missing or required addon not loaded"
  - from: "2"
    to: "2.1"
    required_gate: "none"
    block_condition: "missing repo discovery artifacts"
  - from: "2.1"
    to: "1.5"
    required_gate: "none"
    block_condition: "business rules required but evidence missing"
  - from: "2.1"
    to: "3A"
    required_gate: "none"
    block_condition: "api inventory required but evidence missing"
  # ── Phase 3 (API) ────────────────────────────────────────────────
  - from: "3A"
    to: "4"
    required_gate: "none"
    block_condition: "no APIs in scope (not-applicable)"
    note: "Direct skip when no_apis condition is met"
  - from: "3A"
    to: "3B-1"
    required_gate: "none"
    block_condition: "API inventory incomplete"
  - from: "3B-1"
    to: "3B-2"
    required_gate: "none"
    block_condition: "logical validation incomplete"
  - from: "3B-2"
    to: "4"
    required_gate: "none"
    block_condition: "contract validation blocked"
  # ── Phase 4/5 ────────────────────────────────────────────────────
  - from: "4"
    to: "5"
    required_gate: "none"
    block_condition: "missing plan or required evidence"
  - from: "5"
    to: "5.3"
    required_gate: "P5-Architecture"
    block_condition: "architecture not approved"
  # ── Phase 5.3 exits ──────────────────────────────────────────────
  - from: "5.3"
    to: "5.4"
    required_gate: "P5.3-TestQuality"
    block_condition: "business rules gate required (Phase 1.5 executed)"
  - from: "5.3"
    to: "5.5"
    required_gate: "P5.3-TestQuality"
    block_condition: "technical debt proposed and requires review"
  - from: "5.3"
    to: "5.6"
    required_gate: "P5.3-TestQuality"
    block_condition: "rollback safety required"
  - from: "5.3"
    to: "6"
    required_gate: "P5.3-TestQuality"
    block_condition: "test quality not passing"
  # ── Phase 5.4 exits ──────────────────────────────────────────────
  - from: "5.4"
    to: "5.5"
    required_gate: "P5.4-BusinessRules"
    block_condition: "technical debt proposed and requires review"
  - from: "5.4"
    to: "5.6"
    required_gate: "P5.4-BusinessRules"
    block_condition: "rollback safety required"
  - from: "5.4"
    to: "6"
    required_gate: "P5.4-BusinessRules"
    block_condition: "business rules compliance not passing"
  # ── Phase 5.5 exits ──────────────────────────────────────────────
  - from: "5.5"
    to: "5.6"
    required_gate: "P5.5-TechnicalDebt"
    block_condition: "rollback safety required"
  - from: "5.5"
    to: "6"
    required_gate: "P5.5-TechnicalDebt"
    block_condition: "technical debt gate not approved or not-applicable"
  # ── Phase 5.6 exit ───────────────────────────────────────────────
  - from: "5.6"
    to: "6"
    required_gate: "P5.6-RollbackSafety"
    block_condition: "rollback safety not approved or not-applicable"
  # ── Phase 6 internal transitions ─────────────────────────────────
  - from: "6"
    to: "6"
    required_gate: "P6-Prerequisites"
    block_condition: "P5 prerequisite gates not met (P5-Architecture, P5.3, P5.5 always; P5.4/P5.6 conditional)"
    note: "Entry guard: can_promote_to_phase6() must pass"
  - from: "6"
    to: "6"
    required_gate: "none"
    block_condition: "implementation review iterations pending"
    note: "Implementation Internal Review loop (max 3 iterations)"
  - from: "6"
    to: "6"
    required_gate: "none"
    block_condition: "review complete, awaiting /review-decision"
    note: "Evidence Presentation Gate — user must run /review-decision"
  - from: "6"
    to: "6"
    required_gate: "none"
    block_condition: "none (terminal)"
    note: "workflow_approved: /review-decision approve → Workflow Complete"
  - from: "6"
    to: "6"
    required_gate: "none"
    block_condition: "changes requested, clarification required"
    note: "review_changes_requested: /review-decision changes_requested → Rework Clarification Gate within Phase 6"
  - from: "6"
    to: "4"
    required_gate: "none"
    block_condition: "review rejected, restart from planning"
    note: "review_rejected: /review-decision reject → back to Phase 4"

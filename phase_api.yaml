version: 1
schema: opencode.phase-api.v1
start_token: "0"
phases:
  - token: "0"
    phase: "0-None"
    active_gate: "Bootstrap Required"
    next_gate_condition: "Run bootstrap before governance execution."
    next: "1.1"
    route_strategy: "next"

  - token: "1.1"
    phase: "1.1-Bootstrap"
    active_gate: "Workspace Ready Gate"
    next_gate_condition: "Complete workspace persistence and pointer verification."
    next: "1"
    route_strategy: "stay"

  - token: "1"
    phase: "1-WorkspacePersistence"
    active_gate: "Persistence Gate"
    next_gate_condition: "Persist bootstrap artifacts and verify workspace state."
    next: "1.2"
    route_strategy: "stay"

  - token: "1.2"
    phase: "1.2-ActivationIntent"
    active_gate: "Activation Intent"
    next_gate_condition: "Activation intent committed; continue to repository discovery."
    next: "1.3"
    route_strategy: "next"
    transitions:
      - when: default
        next: "1.3"
        source: "phase-1.2-to-1.3-auto"
        active_gate: "Rulebook Load Gate"
        next_gate_condition: "Execute Phase 1.3 Rulebook Load (auto)"
    exit_required_keys:
      - Intent.Path
      - Intent.Sha256
      - Intent.EffectiveScope

  - token: "1.3"
    phase: "1.3-RulebookLoad"
    active_gate: "Rulebook Load Gate"
    next_gate_condition: "Load core/profile/templates/addons rulebooks with evidence."
    next: "2"
    route_strategy: "stay"
    exit_required_keys:
      - LoadedRulebooks.core
      - LoadedRulebooks.profile
      - RulebookLoadEvidence.core
      - RulebookLoadEvidence.profile
      - ActiveProfile
      - AddonsEvidence

  - token: "2"
    phase: "2-RepoDiscovery"
    active_gate: "Repo Discovery"
    next_gate_condition: "Run repository discovery and cache artifacts."
    next: "2.1"
    route_strategy: "stay"
    exit_required_keys:
      - RepoDiscovery.Completed
      - RepoDiscovery.RepoCacheFile
      - RepoDiscovery.RepoMapDigestFile

  - token: "2.1"
    phase: "2.1-DecisionPack"
    active_gate: "Decision Pack"
    next_gate_condition: "Resolve business rules path, then continue."
    route_strategy: "next"
    transitions:
      - when: business_rules_execute
        next: "1.5"
        source: "phase-1.5-routing-required"
        active_gate: "Business Rules Bootstrap"
        next_gate_condition: "Auto-bootstrap business rules placeholder when inventory is missing, then continue to Phase 3A"
      - when: default
        next: "3A"
        source: "phase-2.1-to-3a"
        active_gate: "API Validation Routing"
        next_gate_condition: "Execute Phase 3A API Inventory; if no APIs are detected, record not-applicable and proceed to Phase 4"
  - token: "1.5"
    phase: "1.5-BusinessRules"
    active_gate: "Business Rules Bootstrap"
    next_gate_condition: "Business rules persisted; continue with API inventory."
    next: "3A"
    route_strategy: "next"
    transitions:
      - when: default
        next: "3A"
        source: "phase-1.5-to-3a"
        active_gate: "API Validation Routing"
        next_gate_condition: "Execute Phase 3A API Inventory; if no APIs are detected, record not-applicable and proceed to Phase 4"
    exit_required_keys:
      - BusinessRules.Inventory.sha256

  - token: "3A"
    phase: "3A-API-Inventory"
    active_gate: "API Inventory"
    next_gate_condition: "Inventory APIs and decide whether deep validation applies."
    route_strategy: "next"
    transitions:
      - when: no_apis
        next: "4"
        source: "phase-3a-not-applicable-to-phase4"
        active_gate: "Ticket Input Gate"
        next_gate_condition: "Phase 3A completed with not-applicable (no APIs detected); continue via /continue, then provide ticket/task input or run /review for read-only feedback at Phase 4"
      - when: default
        next: "3B-1"
        source: "phase-3a-to-3b1"
        active_gate: "API Logical Validation"
        next_gate_condition: "APIs detected; proceed to Phase 3B-1 logical validation"
    exit_required_keys:
      - APIInventory.Status

  - token: "3B-1"
    phase: "3B-1"
    active_gate: "API Logical Validation"
    next_gate_condition: "Validate API logic constraints and continue."
    next: "3B-2"
    route_strategy: "next"
    transitions:
      - when: default
        next: "3B-2"
        source: "phase-3b1-to-3b2"
        active_gate: "Contract Validation"
        next_gate_condition: "Phase 3B-1 complete; proceed to Phase 3B-2 contract validation"

  - token: "3B-2"
    phase: "3B-2"
    active_gate: "Contract Validation"
    next_gate_condition: "Validate API contracts and continue to ticket intake."
    next: "4"
    route_strategy: "next"
    transitions:
      - when: default
        next: "4"
        source: "phase-3b2-to-4"
        active_gate: "Ticket Input Gate"
        next_gate_condition: "Phase 3B-2 complete; continue via /continue, then provide ticket/task input or run /review for read-only feedback at Phase 4"

  - token: "4"
    phase: "4"
    active_gate: "Ticket Input Gate"
    next_gate_condition: "Collect ticket and planning constraints (or run /review for read-only feedback with no state change)."
    next: "5"
    route_strategy: "next"
    transitions:
      - when: ticket_present
        next: "5"
        source: "phase-4-to-5-ticket-intake"
        active_gate: "Plan Record Preparation Gate"
        next_gate_condition: "Ticket/task evidence captured; continue to Phase 5 plan-record preparation before architecture review"
      - when: default
        next: "4"
        source: "phase-4-awaiting-ticket-intake"
        active_gate: "Ticket Input Gate"
        next_gate_condition: "Provide ticket/task details to continue from Phase 4 to Phase 5, or run /review for read-only review feedback (no state change)"

  - token: "5"
    phase: "5-ArchitectureReview"
    active_gate: "Plan Record Preparation Gate"
    next_gate_condition: "When plan_record_versions < 1, create and persist plan-record v1 in Plan Record Preparation Gate. When plan_record_versions >= 1, stay in Architecture Review Gate until deterministic internal self-review completes before advancing to Phase 5.3."
    next: "5.3"
    route_strategy: "stay"
    transitions:
      - when: plan_record_missing
        next: "5"
        source: "phase-5-plan-record-prep-required"
        active_gate: "Plan Record Preparation Gate"
        next_gate_condition: "Plan record v1 is required. Produce a plan draft and persist plan-record evidence before architecture review."
      - when: self_review_iterations_pending
        next: "5"
        source: "phase-5-self-review-required"
        active_gate: "Architecture Review Gate"
        next_gate_condition: "Plan record is present. Continue deterministic internal self-review until completion condition is met (max 3, or unchanged digest after minimum iterations)."
      - when: self_review_iterations_met
        next: "5.3"
        source: "phase-5-architecture-review-ready"
        active_gate: "Architecture Review Gate"
        next_gate_condition: "Plan review loop complete (hard-stop at max iterations or early-stop on unchanged digest after minimum iterations). Proceed to Phase 5.3 test-quality gate."
      - when: default
        next: "5"
        source: "phase-5-plan-record-prep-default"
        active_gate: "Architecture Review Gate"
        next_gate_condition: "Stay in Phase 5 until plan-record evidence and required internal self-review iterations are complete."
    output_policy:
      allowed_output_classes:
        - plan
        - review
        - risk_analysis
        - test_strategy
        - gate_check
        - rollback_plan
        - review_questions
        - consolidated_review_plan
      forbidden_output_classes:
        - implementation
        - patch
        - diff
        - code_delivery
      plan_discipline:
        first_output_is_draft: true
        draft_not_review_ready: true
        min_self_review_iterations: 1

  - token: "5.3"
    phase: "5.3-TestQuality"
    active_gate: "Test Quality Gate"
    next_gate_condition: "Validate tests and quality checks."
    next: "6"
    route_strategy: "next"
    transitions:
      - when: business_rules_gate_required
        next: "5.4"
        source: "phase-5.3-to-5.4"
        active_gate: "Business Rules Validation"
        next_gate_condition: "Phase 1.5 executed; Phase 5.4 is mandatory before proceeding"
      - when: technical_debt_proposed
        next: "5.5"
        source: "phase-5.3-to-5.5"
        active_gate: "Technical Debt Gate"
        next_gate_condition: "Technical debt proposed; evaluate in Phase 5.5"
      - when: rollback_required
        next: "5.6"
        source: "phase-5.3-to-5.6"
        active_gate: "Rollback Safety Gate"
        next_gate_condition: "Rollback safety checks required in Phase 5.6"
      - when: default
        next: "6"
        source: "phase-5.3-to-6"
        active_gate: "Post Flight"
        next_gate_condition: "Phase 5 checks complete; proceed to post-flight"

  - token: "5.4"
    phase: "5.4-BusinessRules"
    active_gate: "Business Rules Validation"
    next_gate_condition: "Validate business-rules consistency when Phase 1.5 was executed."
    next: "5.5"
    route_strategy: "next"
    transitions:
      - when: technical_debt_proposed
        next: "5.5"
        source: "phase-5.4-to-5.5"
        active_gate: "Technical Debt Gate"
        next_gate_condition: "Business rules validation complete; technical debt proposed"
      - when: rollback_required
        next: "5.6"
        source: "phase-5.4-to-5.6"
        active_gate: "Rollback Safety Gate"
        next_gate_condition: "Business rules validation complete; rollback checks required"
      - when: default
        next: "6"
        source: "phase-5.4-to-6"
        active_gate: "Post Flight"
        next_gate_condition: "Business rules validation complete; proceed to post-flight"

  - token: "5.5"
    phase: "5.5-TechnicalDebt"
    active_gate: "Technical Debt Review"
    next_gate_condition: "Capture and control technical debt."
    next: "5.6"
    route_strategy: "next"
    transitions:
      - when: rollback_required
        next: "5.6"
        source: "phase-5.5-to-5.6"
        active_gate: "Rollback Safety Review"
        next_gate_condition: "Technical debt recorded; rollback checks required"
      - when: default
        next: "6"
        source: "phase-5.5-to-6"
        active_gate: "Post Flight"
        next_gate_condition: "Technical debt review complete; proceed to post-flight"

  - token: "5.6"
    phase: "5.6-RollbackSafety"
    active_gate: "Rollback Safety Review"
    next_gate_condition: "Ensure rollback strategy is available when required."
    next: "6"
    route_strategy: "next"
    transitions:
      - when: default
        next: "6"
        source: "phase-5.6-to-6"
        active_gate: "Post Flight"
        next_gate_condition: "Rollback safety checks complete; proceed to post-flight"

  - token: "6"
    phase: "6-PostFlight"
    active_gate: "Post Flight"
    next_gate_condition: "Implement, run deterministic internal implementation review loop (max 3, early-stop only on unchanged digest), then present evidence for final user review."
    route_strategy: "stay"
    transitions:
      - when: implementation_started
        next: "6"
        source: "phase-6-implementation-started"
        active_gate: "Implementation Started"
        next_gate_condition: "Implementation phase started from approved governance handoff. Proceed with repository changes and execution work."
      - when: workflow_approved
        next: "6"
        source: "phase-6-workflow-complete"
        active_gate: "Workflow Complete"
        next_gate_condition: "Workflow approved. Governance is complete and implementation is authorized. Run /implement to start the implementation phase."
      - when: review_changes_requested
        next: "6"
        source: "phase-6-changes-requested-loop-reset"
        active_gate: "Rework Clarification Gate"
        next_gate_condition: "Changes requested by reviewer. Clarify requested changes in chat, then run the directed next rail (/ticket, /plan, or /continue)."
      - when: rework_clarification_pending
        next: "6"
        source: "phase-6-rework-clarification-required"
        active_gate: "Rework Clarification Gate"
        next_gate_condition: "Clarification is still required. Describe requested changes in chat; then run exactly one directed rail (/ticket, /plan, or /continue)."
      - when: review_rejected
        next: "4"
        source: "phase-6-rejected-to-phase4"
        active_gate: "Ticket Input Gate"
        next_gate_condition: "Review rejected. Workflow returned to Phase 4 for re-planning. Provide updated ticket/task details to restart."
      - when: implementation_review_pending
        next: "6"
        source: "phase-6-implementation-review-required"
        active_gate: "Implementation Internal Review"
        next_gate_condition: "Complete deterministic internal implementation review iterations (max 3). Early-stop is only allowed when digest is unchanged after minimum iterations."
      - when: implementation_review_complete
        next: "6"
        source: "phase-6-ready-for-user-review"
        active_gate: "Evidence Presentation Gate"
        next_gate_condition: "Implementation review loop is complete. Present evidence and submit final review decision via /review-decision (approve | changes_requested | reject)."
      - when: default
        next: "6"
        source: "phase-6-implementation-review-required"
        active_gate: "Implementation Internal Review"
        next_gate_condition: "Complete internal implementation review iterations (max 3) before presenting final evidence."

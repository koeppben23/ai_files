# Blocked Reason Catalog Configuration
#
# SSOT Status: POLICY-BOUND
# - This config is part of the engine master policy
# - Changes require POLICY_PRECEDENCE_APPLIED audit event
# - NOT modifiable via repo/process_env in pipeline mode
# - Pack-locked on activation; hash recorded in SESSION_STATE
# - Parity required with: reason_codes.py, reason_codes.registry.json, _embedded_reason_registry.py
#
# Precedence: engine master policy > activation > mode-policy > host > repo

# Policy Metadata
policy:
  version: "1.0.0"
  precedence_level: "engine_master_policy"
  pack_locked: true
  audit_on_change: "POLICY_PRECEDENCE_APPLIED"

# Blocked Reason Catalog (Kernel-Enforced)
# Each reason defines: trigger conditions, required inputs, recovery steps, next command pointer
blocked_reasons:

  # Bootstrap Errors
  BLOCKED-BOOTSTRAP-NOT-SATISFIED:
    reason_code: "BLOCKED-BOOTSTRAP-NOT-SATISFIED"
    surface: "state"
    category: "bootstrap"
    trigger_description: "Bootstrap declaration not satisfied or missing"
    required_inputs:
      - "Explicit bootstrap declaration restatement"
    quick_fix_commands:
      - "opencode-governance-bootstrap"
    next_command_pointer: "opencode-governance-bootstrap"
    recovery_steps:
      - "Restate the bootstrap declaration explicitly"
      - "Run the local bootstrap launcher to re-validate bootstrap"
    message_template: "Bootstrap not satisfied. Please restate bootstrap declaration."

  BLOCKED-START-REQUIRED:
    reason_code: "BLOCKED-START-REQUIRED"
    surface: "state"
    category: "bootstrap"
    trigger_description: "/start evidence required before phase execution"
    required_inputs:
      - "Valid /start evidence"
    quick_fix_commands:
      - "opencode-governance-bootstrap"
    next_command_pointer: "opencode-governance-bootstrap"
    recovery_steps:
      - "Run the local bootstrap launcher to gather bootstrap evidence"
    message_template: "Bootstrap evidence required. Run the local bootstrap launcher first."

  BLOCKED-MISSING-BINDING-FILE:
    reason_code: "BLOCKED-MISSING-BINDING-FILE"
    surface: "state"
    category: "bootstrap"
    trigger_description: "governance.paths.json binding file not found"
    required_inputs:
      - "Valid governance.paths.json"
    quick_fix_commands:
      - "${PYTHON_COMMAND} install.py"
    next_command_pointer: "opencode-governance-bootstrap"
    recovery_steps:
      - "Run install.py to generate binding file"
      - "Verify governance.paths.json exists at ${CONFIG_ROOT}"
    message_template: "Binding file missing. Run install.py."

  # Rulebook Errors
  BLOCKED-RULEBOOK-LOAD-FAILED:
    reason_code: "BLOCKED-RULEBOOK-LOAD-FAILED"
    surface: "state"
    category: "rulebook"
    trigger_description: "Core rulebook cannot be loaded at Phase 4 entry"
    required_inputs:
      - "Valid rules.md file"
    quick_fix_commands:
      - "Verify ${PROFILES_HOME}/rules.md exists"
    next_command_pointer: "/continue"
    recovery_steps:
      - "Verify rules.md exists in canonical location"
      - "Check file permissions and encoding"
      - "Run /continue to retry rulebook activation"
    message_template: "Core rulebook load failed. Verify rules.md exists."

  BLOCKED-MISSING-RULEBOOK:
    reason_code: "BLOCKED-MISSING-RULEBOOK"
    surface: "state"
    category: "rulebook"
    trigger_description: "Required rulebook file cannot be resolved"
    required_inputs:
      - "Missing rulebook file"
    quick_fix_commands:
      - "Check if {file} exists"
    next_command_pointer: "/continue"
    recovery_steps:
      - "Create or restore the missing rulebook file"
      - "Run /continue to retry rulebook activation"
    message_template: "Missing rulebook: {file}."

  BLOCKED-MISSING-PROFILE:
    reason_code: "BLOCKED-MISSING-PROFILE"
    surface: "profile"
    category: "rulebook"
    trigger_description: "Active profile required but not set or loadable"
    required_inputs:
      - "Profile selection"
    quick_fix_commands:
      - "/continue"
    next_command_pointer: "/continue"
    recovery_steps:
      - "Select a profile explicitly"
      - "Verify profile rulebook exists"
      - "Run /continue to retry rulebook activation"
    message_template: "Profile missing. Select profile or verify rulebook."

  BLOCKED-MISSING-TEMPLATES:
    reason_code: "BLOCKED-MISSING-TEMPLATES"
    surface: "profile"
    category: "rulebook"
    trigger_description: "Required templates rulebook cannot be resolved"
    required_inputs:
      - "Templates rulebook"
    quick_fix_commands:
      - "Check if templates rulebook exists"
    next_command_pointer: "/continue"
    recovery_steps:
      - "Verify templates rulebook exists for active profile"
      - "Run /continue to retry rulebook activation"
    message_template: "Templates rulebook missing for profile."

  BLOCKED-MISSING-ADDON:
    reason_code: "BLOCKED-MISSING-ADDON"
    surface: "addons"
    category: "rulebook"
    trigger_description: "Required addon rulebook cannot be resolved"
    required_inputs:
      - "Addon rulebook"
    quick_fix_commands:
      - "Check if addon manifest and rulebook exist"
    next_command_pointer: "/continue"
    recovery_steps:
      - "Verify addon manifest in ${PROFILES_HOME}/addons/"
      - "Verify addon rulebook exists"
      - "Run /continue to retry rulebook activation"
    message_template: "Required addon {addon_key} missing."

  # Profile Detection
  BLOCKED-AMBIGUOUS-PROFILE:
    reason_code: "BLOCKED-AMBIGUOUS-PROFILE"
    surface: "profile"
    category: "detection"
    trigger_description: "Multiple profile candidates detected without unique match"
    required_inputs:
      - "Explicit profile selection"
    quick_fix_commands:
      - "Select profile: 1=<recommended> | 2=<alt> | 3=<alt> | 4=fallback-minimum | 0=abort"
    next_command_pointer: "opencode-governance-bootstrap"
    recovery_steps:
      - "Select a profile from the ranked shortlist"
      - "Provide explicit profile selection"
    message_template: "Ambiguous profile. Select from {candidates}."

  # Evidence Errors
  BLOCKED-MISSING-EVIDENCE:
    reason_code: "BLOCKED-MISSING-EVIDENCE"
    surface: "state"
    category: "evidence"
    trigger_description: "Required evidence for deterministic decision is missing"
    required_inputs:
      - "Missing evidence"
    quick_fix_commands:
      - "opencode-governance-bootstrap"
    next_command_pointer: "opencode-governance-bootstrap"
    recovery_steps:
      - "Provide the missing evidence"
      - "Run the local bootstrap launcher to re-gather evidence"
    message_template: "Missing evidence: {evidence_type}."

  BLOCKED-RULEBOOK-EVIDENCE-MISSING:
    reason_code: "BLOCKED-RULEBOOK-EVIDENCE-MISSING"
    surface: "state"
    category: "evidence"
    trigger_description: "Rulebook load evidence cannot be produced"
    required_inputs:
      - "Load evidence (path/tool output/hash)"
    quick_fix_commands:
      - "Verify rulebook accessibility"
    next_command_pointer: "/continue"
    recovery_steps:
      - "Verify rulebook file exists and is readable"
      - "Provide explicit load evidence if host tools unavailable"
    message_template: "Rulebook load evidence missing."

  # Activation Errors
  BLOCKED-ACTIVATION-DELTA-MISMATCH:
    reason_code: "BLOCKED-ACTIVATION-DELTA-MISMATCH"
    surface: "state"
    category: "activation"
    trigger_description: "Activation outcome differs while hashes are unchanged"
    required_inputs:
      - "Investigation of hash/activation mismatch"
    quick_fix_commands:
      - "Clear cache and re-run the bootstrap launcher"
    next_command_pointer: "opencode-governance-bootstrap"
    recovery_steps:
      - "Clear SESSION_STATE cache"
      - "Re-run the local bootstrap launcher to re-activate"
      - "Report if mismatch persists"
    message_template: "Activation delta mismatch. Re-run the local bootstrap launcher."

  # State Errors
  BLOCKED-STATE-OUTDATED:
    reason_code: "BLOCKED-STATE-OUTDATED"
    surface: "state"
    category: "state"
    trigger_description: "Persisted state is outdated and migration failed"
    required_inputs:
      - "Fresh session state"
    quick_fix_commands:
      - "opencode-governance-bootstrap --fresh"
    next_command_pointer: "opencode-governance-bootstrap"
    recovery_steps:
      - "Start fresh session with the local bootstrap launcher --fresh"
      - "Or provide updated session state"
    message_template: "Session state outdated. Start fresh."

  # Pipeline Mode Errors
  BLOCKED-PIPELINE-INTERACTIVE:
    reason_code: "BLOCKED-PIPELINE-INTERACTIVE"
    surface: "state"
    category: "pipeline"
    trigger_description: "Pipeline mode requires human interaction"
    required_inputs:
      - "None (configuration error)"
    quick_fix_commands:
      - "Fix pipeline configuration"
    next_command_pointer: "/continue"
    recovery_steps:
      - "Pipeline mode cannot request human interaction"
      - "Fix the configuration that triggered this block"
    message_template: "Pipeline mode blocked on interactive requirement."

  BLOCKED-PIPELINE-HUMAN-ASSIST:
    reason_code: "BLOCKED-PIPELINE-HUMAN-ASSIST"
    surface: "state"
    category: "pipeline"
    trigger_description: "Pipeline mode requires human approval"
    required_inputs:
      - "None (configuration error)"
    quick_fix_commands:
      - "Fix pipeline configuration"
    next_command_pointer: "/continue"
    recovery_steps:
      - "Pipeline mode cannot request human approval"
      - "Fix the configuration that triggered this block"
    message_template: "Pipeline mode blocked on human approval."

  # Engine Self-Check
  BLOCKED-ENGINE-SELFCHECK:
    reason_code: "BLOCKED-ENGINE-SELFCHECK"
    surface: "state"
    category: "engine"
    trigger_description: "Engine self-check failed (config/parser/initialization)"
    required_inputs:
      - "Fix for engine configuration"
    quick_fix_commands:
      - "Verify engine configuration"
    next_command_pointer: "opencode-governance-bootstrap"
    recovery_steps:
      - "Verify policy-bound config files exist"
      - "Verify YAML parser is available"
      - "Run the local bootstrap launcher to retry"
    message_template: "Engine self-check failed. Verify configuration."

  # Additional blocked reasons (from SESSION_STATE_SCHEMA.md)
  BLOCKED-MISSING-CORE-RULES:
    reason_code: "BLOCKED-MISSING-CORE-RULES"
    surface: "state"
    category: "rulebook"
    trigger_description: "Phase 4 begins and rules.md could not be resolved/loaded"
    required_inputs:
      - "Valid rules.md file"
    quick_fix_commands:
      - "Run installer repair to restore core rulebooks"
    next_command_pointer: "/continue"
    recovery_steps:
      - "Run installer to restore rulebooks"
      - "Verify rules.md exists under ${RUNTIME_HOME}"
    message_template: "Core rules missing. Run installer repair."

  BLOCKED-MISSING-DECISION:
    reason_code: "BLOCKED-MISSING-DECISION"
    surface: "state"
    category: "gate"
    trigger_description: "Decision gate active but no valid deterministic option set can be produced"
    required_inputs:
      - "Missing decision input/evidence"
    quick_fix_commands:
      - "Provide the required decision input"
    next_command_pointer: "/continue"
    recovery_steps:
      - "Provide minimal missing decision input"
      - "Construct valid option set"
    message_template: "Decision gate missing required input."

  BLOCKED-P4-INTAKE-MISSING-EVIDENCE:
    reason_code: "BLOCKED-P4-INTAKE-MISSING-EVIDENCE"
    surface: "state"
    category: "gate"
    trigger_description: "Phase 4 intake evidence is missing or incomplete for deterministic routing"
    required_inputs:
      - "Canonical ticket or task text"
      - "Matching TicketRecordDigest and/or TaskRecordDigest"
    quick_fix_commands:
      - "opencode-governance-bootstrap --ticket-persist --ticket-text \"...\""
    next_command_pointer: "/continue"
    recovery_steps:
      - "Provide non-empty ticket or task input"
      - "Persist intake via --ticket-persist"
      - "Re-run phase routing"
    message_template: "Phase 4 blocked: intake evidence missing. Persist canonical ticket/task with matching digest."

  BLOCKED-P5-PLAN-RECORD-PERSIST:
    reason_code: "BLOCKED-P5-PLAN-RECORD-PERSIST"
    surface: "state"
    category: "gate"
    trigger_description: "Phase 5 plan-record evidence is missing, unreadable, or failed to persist"
    required_inputs:
      - "Canonical Phase 5 plan record text"
      - "Matching plan record digest/version evidence"
    quick_fix_commands:
      - "opencode-governance-bootstrap --plan-persist --plan-text \"...\""
    next_command_pointer: "/continue"
    recovery_steps:
      - "Provide non-empty plan record content"
      - "Persist plan record via --plan-persist"
      - "Re-run /continue materialization"
    message_template: "Phase 5 blocked: plan-record evidence missing. Persist canonical plan record before architecture review."

  BLOCKED-P6-PREREQUISITES-NOT-MET:
    reason_code: "BLOCKED-P6-PREREQUISITES-NOT-MET"
    surface: "state"
    category: "gate"
    trigger_description: "Phase 6 transition attempted before required upstream gate prerequisites are satisfied"
    required_inputs:
      - "P5-Architecture gate approved"
      - "P5.3-TestQuality gate passed"
    quick_fix_commands:
      - "Set required P5 gate states and re-run phase transition"
    next_command_pointer: "/continue"
    recovery_steps:
      - "Approve architecture gate outcome"
      - "Ensure test quality gate reports pass"
      - "If business rules apply, ensure P5.4 is compliant"
      - "If rollback safety applies, ensure P5.6 is approved"
      - "Re-run phase transition"
    message_template: "Phase 6 blocked: prerequisites not met. Satisfy required P5 gate outcomes."

  BLOCKED-ADDON-CONFLICT:
    reason_code: "BLOCKED-ADDON-CONFLICT"
    surface: "addons"
    category: "activation"
    trigger_description: "Multiple activated addons/templates impose mutually incompatible requirements"
    required_inputs:
      - "Conflict resolution selection"
    quick_fix_commands:
      - "Select authoritative addon/template constraint"
    next_command_pointer: "/continue"
    recovery_steps:
      - "Select authoritative constraint"
      - "Or narrow component scope"
    message_template: "Addon conflict detected. Resolve constraint."

  BLOCKED-R:
    reason_code: "BLOCKED-R"
    surface: "state"
    category: "recovery"
    trigger_description: "Recovery routine required to proceed (explicit recovery gate)"
    required_inputs:
      - "Confirmation to run recovery"
    quick_fix_commands:
      - "/continue"
    next_command_pointer: "/continue"
    recovery_steps:
      - "Run /continue with current evidence"
      - "Re-validate SESSION_STATE"
    message_template: "Recovery required. Run /continue."

  BLOCKED-RESUME-STATE-VIOLATION:
    reason_code: "BLOCKED-RESUME-STATE-VIOLATION"
    surface: "state"
    category: "state"
    trigger_description: "Persisted SESSION_STATE violates SESSION_STATE_SCHEMA.md"
    required_inputs:
      - "Permission to reset/repair invalid state"
    quick_fix_commands:
      - "Delete invalid state file and opencode-governance-bootstrap"
    next_command_pointer: "opencode-governance-bootstrap"
    recovery_steps:
      - "Collect current state as evidence"
      - "Repair to minimal valid state or delete"
      - "Re-run the local bootstrap launcher"
    message_template: "State violation. Reset or repair state."

  BLOCKED-WORKSPACE-MEMORY-INVALID:
    reason_code: "BLOCKED-WORKSPACE-MEMORY-INVALID"
    surface: "state"
    category: "state"
    trigger_description: "WORKSPACE_MEMORY_FILE exists but cannot be parsed/validated"
    required_inputs:
      - "Fix or remove invalid memory file"
    quick_fix_commands:
      - "Remove ${WORKSPACE_MEMORY_FILE}"
    next_command_pointer: "/continue"
    recovery_steps:
      - "Fix the YAML file"
      - "Or remove it to proceed"
    message_template: "Workspace memory invalid. Fix or remove."

  BLOCKED-VARIABLE-RESOLUTION:
    reason_code: "BLOCKED-VARIABLE-RESOLUTION"
    surface: "state"
    category: "bootstrap"
    trigger_description: "Runtime cannot resolve path variables (CONFIG_ROOT, RUNTIME_HOME)"
    required_inputs:
      - "Installer repair"
    quick_fix_commands:
      - "${PYTHON_COMMAND} install.py"
    next_command_pointer: "opencode-governance-bootstrap"
    recovery_steps:
      - "Determine OS-specific config root"
      - "Verify ${CONFIG_ROOT} and ${RUNTIME_HOME} exist"
      - "Verify master.md and rules.md present"
      - "Rerun installer and the local bootstrap launcher"
    message_template: "Variable resolution failed. Run installer."

  BLOCKED-PERSISTENCE-PATH-VIOLATION:
    reason_code: "BLOCKED-PERSISTENCE-PATH-VIOLATION"
    surface: "state"
    category: "persistence"
    trigger_description: "Path contains OS-specific patterns (backslash, drive prefix, parent traversal)"
    required_inputs:
      - "Valid path without OS-specific patterns"
    quick_fix_commands:
      - "Use variable-based path expression"
    next_command_pointer: "/continue"
    recovery_steps:
      - "Replace OS-specific path with variable expression"
      - "Use ${CONFIG_ROOT} instead of absolute path"
    message_template: "Path violation. Use variable-based path."

  BLOCKED-PERSISTENCE-TARGET-DEGENERATE:
    reason_code: "BLOCKED-PERSISTENCE-TARGET-DEGENERATE"
    surface: "state"
    category: "persistence"
    trigger_description: "Target path is degenerate (single drive letter, drive root token, single segment)"
    required_inputs:
      - "Valid multi-segment path"
    quick_fix_commands:
      - "Provide complete target path"
    next_command_pointer: "/continue"
    recovery_steps:
      - "Provide complete path with multiple segments"
      - "Or use variable-based path expression"
    message_template: "Degenerate target path. Provide complete path."

  # Strict-exit enforcement (principal_strict mode)
  BLOCKED-STRICT-EVIDENCE-MISSING:
    reason_code: "BLOCKED-STRICT-EVIDENCE-MISSING"
    surface: "state"
    category: "gate"
    trigger_description: "Critical pass criterion requires evidence that is entirely missing under principal_strict mode"
    required_inputs:
      - "Missing evidence artifact for the failing criterion"
    quick_fix_commands:
      - "Provide required evidence artifact"
    next_command_pointer: "/continue"
    recovery_steps:
      - "Identify missing artifact from strict-exit result"
      - "Collect or regenerate the required evidence"
      - "Re-run phase transition"
    message_template: "Strict exit blocked: missing evidence for {criterion}."

  BLOCKED-STRICT-EVIDENCE-STALE:
    reason_code: "BLOCKED-STRICT-EVIDENCE-STALE"
    surface: "state"
    category: "gate"
    trigger_description: "Critical pass criterion evidence is stale (exceeds TTL) under principal_strict mode"
    required_inputs:
      - "Fresh evidence artifact for the failing criterion"
    quick_fix_commands:
      - "Refresh stale evidence artifact"
    next_command_pointer: "/continue"
    recovery_steps:
      - "Identify stale artifact from strict-exit result"
      - "Refresh the evidence within the allowed TTL"
      - "Re-run phase transition"
    message_template: "Strict exit blocked: stale evidence for {criterion}."

  BLOCKED-STRICT-THRESHOLD:
    reason_code: "BLOCKED-STRICT-THRESHOLD"
    surface: "state"
    category: "gate"
    trigger_description: "Critical pass criterion score is below dynamic threshold under principal_strict mode"
    required_inputs:
      - "Improved score or evidence for the failing criterion"
    quick_fix_commands:
      - "Address criterion deficiency and re-evaluate"
    next_command_pointer: "/continue"
    recovery_steps:
      - "Identify failing criterion from strict-exit result"
      - "Improve score to meet or exceed the dynamic threshold"
      - "Re-run phase transition"
    message_template: "Strict exit blocked: threshold not met for {criterion}."

  BLOCKED-STRICT-CONTRACT-MISSING:
    reason_code: "BLOCKED-STRICT-CONTRACT-MISSING"
    surface: "state"
    category: "gate"
    trigger_description: "principal_strict is active but no pass criteria are defined for the current phase (fail-closed)"
    required_inputs:
      - "phase_exit_contract entry with pass_criteria for the target phase"
    quick_fix_commands:
      - "Define pass_criteria in phase_exit_contract or disable principal_strict"
    next_command_pointer: "/continue"
    recovery_steps:
      - "Add pass_criteria for the target phase in the phase_exit_contract"
      - "Or disable principal_strict mode if strict enforcement is not required"
      - "Re-run phase transition"
    message_template: "Strict exit blocked: no contract criteria defined for phase {phase} under principal_strict mode."

  # ---------------------------------------------------------------------------
  # Contract drift — install layout
  # ---------------------------------------------------------------------------
  BLOCKED-CONTRACT-LAYOUT-DRIFT:
    reason_code: "BLOCKED-CONTRACT-LAYOUT-DRIFT"
    surface: "gate"
    category: "gate"
    trigger_description: "Installed file tree does not match install-layout-contract.v_current — missing artifacts, unexpected files, or wrong ownership."
    required_inputs:
      - "install-layout-contract.v_current.md in docs/contracts/"
      - "Binding evidence from governance.paths.json"
    quick_fix_commands:
      - "${PYTHON_COMMAND} install.py"
    next_command_pointer: "opencode-governance-bootstrap"
    recovery_steps:
      - "Run the installer to regenerate missing artifacts"
      - "Remove unexpected files that violate the contract"
      - "Verify governance.paths.json binding evidence is valid"
    message_template: "Install layout contract drift detected: {drift_detail}. Re-run installer to restore conformance."

  # ---------------------------------------------------------------------------
  # Contract drift — runtime state
  # ---------------------------------------------------------------------------
  BLOCKED-CONTRACT-RUNTIME-DRIFT:
    reason_code: "BLOCKED-CONTRACT-RUNTIME-DRIFT"
    surface: "gate"
    category: "gate"
    trigger_description: "Runtime state invariants from runtime-state-contract.v1 are violated — pointer semantics, artifact classification, or backup/purge rules breached."
    required_inputs:
      - "runtime-state-contract.v1.md in docs/contracts/"
      - "SESSION_STATE.json pointer and workspace artifacts"
    quick_fix_commands:
      - "${PYTHON_COMMAND} install.py"
    next_command_pointer: "opencode-governance-bootstrap"
    recovery_steps:
      - "Verify SESSION_STATE.json pointer resolves to a valid workspace"
      - "Ensure canonical artifacts exist and derived artifacts are regenerable"
      - "Re-run installer if pointer or workspace structure is corrupted"
    message_template: "Runtime state contract drift detected: {drift_detail}. Verify pointer and workspace integrity."

  # ---------------------------------------------------------------------------
  # Contract drift — opencode integration
  # ---------------------------------------------------------------------------
  BLOCKED-CONTRACT-OPENCODE-DRIFT:
    reason_code: "BLOCKED-CONTRACT-OPENCODE-DRIFT"
    surface: "gate"
    category: "gate"
    trigger_description: "opencode.json integration invariants from opencode-integration-contract.v1 are violated — merge ownership, plugin lifecycle, or uninstall guarantees breached."
    required_inputs:
      - "opencode-integration-contract.v1.md in docs/contracts/"
      - "opencode.json at config root"
    quick_fix_commands:
      - "${PYTHON_COMMAND} install.py"
    next_command_pointer: "opencode-governance-bootstrap"
    recovery_steps:
      - "Re-run installer to regenerate opencode.json with correct merge ownership"
      - "Verify plugin paths resolve and rail injection order is correct"
      - "Confirm opencode.json is not deleted on uninstall (retention guarantee)"
    message_template: "OpenCode integration contract drift detected: {drift_detail}. Re-run installer to restore conformance."

# Quick Fix Command Templates (Kernel-Enforced)
quick_fix_templates:
  start: "opencode-governance-bootstrap"
  reload_addons: "/continue"
  install: "${PYTHON_COMMAND} install.py"
  check_file: "Check if {path} exists"
  verify_permissions: "Verify file permissions and encoding"
